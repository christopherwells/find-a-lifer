<!DOCTYPE html>
<html>
<head>
  <title>Test Family Filter - Feature #31</title>
  <script>
    async function testFamilyFilter() {
      const results = document.getElementById('results');

      // Wait for page to load
      await new Promise(resolve => setTimeout(resolve, 2000));

      results.innerHTML += '<p>Step 1: Opening test page at http://localhost:5173</p>';
      results.innerHTML += '<p>✓ Open the page manually and click the Species tab</p>';

      results.innerHTML += '<p><strong>Step 2: Open the family filter dropdown</strong></p>';
      results.innerHTML += '<p>• Find the dropdown labeled "Filter by Family"</p>';
      results.innerHTML += '<p>• Current value should be "All Families"</p>';

      results.innerHTML += '<p><strong>Step 3: Select "New World Warblers"</strong></p>';
      results.innerHTML += '<p>• Click the dropdown and select "New World Warblers (86)"</p>';

      results.innerHTML += '<p><strong>Step 4: Verify only warbler species are displayed</strong></p>';
      results.innerHTML += '<p>• Look for the count text showing "showing 86 from New World Warblers"</p>';
      results.innerHTML += '<p>• Verify only one family section is visible: "New World Warblers"</p>';
      results.innerHTML += '<p>• Verify species like American Redstart, Black-and-white Warbler, etc. are visible</p>';

      results.innerHTML += '<p><strong>Step 5: Verify species count reflects filtered count</strong></p>';
      results.innerHTML += '<p>• Check that the count shows "showing 86 from New World Warblers"</p>';

      results.innerHTML += '<p><strong>Step 6: Clear the family filter</strong></p>';
      results.innerHTML += '<p>• Select "All Families" from the dropdown</p>';

      results.innerHTML += '<p><strong>Step 7: Verify full species list is restored</strong></p>';
      results.innerHTML += '<p>• Verify multiple family sections are now visible</p>';
      results.innerHTML += '<p>• Verify count shows "0 of 2490 species seen" (no filter text)</p>';

      results.innerHTML += '<p><strong>✅ Feature #31 Test Plan Ready</strong></p>';
      results.innerHTML += '<p>Now perform these steps manually in the browser.</p>';
    }
  </script>
</head>
<body onload="testFamilyFilter()">
  <h1>Feature #31: Filter by Taxonomic Family</h1>
  <div id="results"></div>
  <hr>
  <p><a href="http://localhost:5173" target="_blank">Open Find-A-Lifer App</a></p>
</body>
</html>
